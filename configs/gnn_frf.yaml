# ============================================================
# gnn_frf.yaml — GNN 编码器 + 逐点FRF解码器
# ============================================================
# 利用 FEM 网格拓扑 (edge_index) 进行图卷积消息传递，
# 使每个节点的表示融合邻居的几何和物理特征。
# 对振动分析尤其有效，因为应力/应变波沿网格单元传播。
# ============================================================

encoder_type: "gnn"
lr: 0.001

encoder_kwargs:
  in_channels: 0              # 附加点特征维度
  hidden_dim: 256
  out_dim: 256
  coord_dim: 3

  # 图卷积参数
  n_layers: 3                 # 图卷积层数
  conv_type: "sage"           # 卷积类型: gcn | sage | gat | gin

  # GAT 特定参数 (仅 conv_type='gat' 时生效)
  gat_heads: 4                # 注意力头数
  gat_dropout: 0.0

  # 全局特征
  use_global_pool: True       # 全局池化特征拼接到每个节点
  global_pool: "mean"         # mean | max | meanmax

decoder_kwargs:
  in_dim: 256
  n_freqs: 300
  hidden_dim: 256
  n_layers: 3
  chunk_size: 512
  out_dim: 1                  # 1=振幅, 2=复数FRF

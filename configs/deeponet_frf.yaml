# ============================================================
# deeponet_frf.yaml — DeepONet Branch/Trunk 编码器 + 逐点FRF解码器
# ============================================================
# Branch: 宏观特征 (材料参数等) → global latent
# Trunk:  空间坐标 (x,y,z) → SIREN 高频空间编码
# Fusion: modulate (FiLM风格) 或 dot product
# ============================================================

encoder_type: "deeponet"
lr: 0.001

encoder_kwargs:
  in_channels: 0              # 附加宏观特征维度 (0 = 仅坐标, 通过coord_proj编码)
  hidden_dim: 256
  out_dim: 256
  coord_dim: 3

  # Branch 宏观编码参数
  branch_layers: 3            # Branch MLP 层数
  branch_pool: "mean"         # 全局池化: "mean" | "max" | "meanmax"

  # Trunk 空间编码 (SIREN) 参数
  trunk_layers: 4             # SIREN 层数
  siren_w0: 30.0              # SIREN 频率因子 (越大约能捕捉高频空间变化)

  # 融合参数
  fusion: "modulate"          # "modulate" (FiLM风格) | "dot" (点积)

  # 无 point_features 时的 fallback
  use_coord_branch: True      # 用坐标的全局池化作为 branch 输入

decoder_kwargs:
  in_dim: 256                 # = encoder out_dim
  n_freqs: 300
  hidden_dim: 256
  n_layers: 3
  chunk_size: 512
  out_dim: 1                  # 1=振幅, 2=复数FRF(实部+虚部)

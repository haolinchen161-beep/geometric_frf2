# ============================================================
# modal_frf.yaml — DeepONet-SIREN 模态参数预测
# ============================================================
# Trunk (SIREN):   (x,y,z) → 空间编码 → φ_k(x) 模态振型
# Branch (MLP):    point_features → 全局池化 → ω_k, ζ_k
# PhysicsDecoder:  φ + ω + ζ + freq → FRF(Re,Im)  (无参数)
# ============================================================

encoder_type: "modal"
lr: 0.0005

encoder_kwargs:
  coord_dim: 3
  point_feat_dim: 7
  hidden_dim: 256
  n_modes: 2
  trunk_layers: 4
  branch_layers: 3
  siren_w0: 15.0
  amp_scale: 500000.0
  freq_min: 1.0
  freq_max: 3000.0

decoder_kwargs: {}  # modal类型内建物理层, 无需独立解码器
